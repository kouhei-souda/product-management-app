services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile

    working_dir: /var/www/html

    ports:
      - "8000:8000"

    volumes:
      - .:/var/www/html

    depends_on:
      - mysql

    networks:
      - app-network

  mysql:
    image: mysql:8.4

    ports:
      - "3306:3306"

    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: laravel
      MYSQL_USER: laravel
      MYSQL_PASSWORD: password

    volumes:
      - mysql-data:/var/lib/mysql

    networks:
      - app-network

networks:
  app-network:

volumes:
  mysql-data: